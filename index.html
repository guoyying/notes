<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .title-section h1 {
            font-size: 22px;
            color: #2c3e50;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .title-section h1:hover {
            border-color: #e0e6ed;
        }
        .title-section h1.editing {
            border-color: #409eff;
            outline: none;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #409eff;
            color: #fff;
        }
        .btn-primary:hover {
            background: #66b1ff;
        }
        .btn-success {
            background: #67c23a;
            color: #fff;
        }
        .btn-success:hover {
            background: #85ce61;
        }
        .btn-warning {
            background: #e6a23c;
            color: #fff;
        }
        .btn-warning:hover {
            background: #ebb563;
        }
        .btn-danger {
            background: #f56c6c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #f78989;
        }
        .btn-secondary {
            background: #909399;
            color: #fff;
        }
        .btn-secondary:hover {
            background: #a6a9ad;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 13px;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .sync-status {
            font-size: 13px;
            color: #909399;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sync-status.synced {
            color: #67c23a;
        }
        .sync-status.unsynced {
            color: #e6a23c;
        }
        .sync-status.error {
            color: #f56c6c;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #606266;
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: #409eff;
        }
        .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        .form-textarea:focus {
            outline: none;
            border-color: #409eff;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .project-item {
            background: #f8f9fc;
            border: 1px solid #ebeef5;
            border-radius: 10px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .project-item:hover {
            border-color: #c6e2ff;
            background: #f0f7ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(64,158,255,0.1);
        }
        .project-item.unsynced {
            border-left: 3px solid #e6a23c;
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .project-name {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
        }
        .project-meta {
            font-size: 12px;
            color: #909399;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .project-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .project-latest {
            font-size: 14px;
            color: #606266;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #ebeef5;
        }
        .project-actions {
            display: flex;
            gap: 6px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .modal-title:hover {
            border-color: #e0e6ed;
        }
        .modal-title.editing {
            border-color: #409eff;
            outline: none;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #909399;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: #f5f7fa;
            color: #606266;
        }
        .modal-body {
            padding: 20px 24px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #ebeef5;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .step-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .step-item {
            background: #f8f9fc;
            border-radius: 10px;
            padding: 14px 16px;
            border: 1px solid #ebeef5;
            transition: all 0.2s;
        }
        .step-item:hover {
            border-color: #d9ecff;
        }
        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .step-num {
            background: #409eff;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        .step-time {
            font-size: 12px;
            color: #909399;
            text-align: right;
        }
        .step-time div {
            line-height: 1.8;
        }
        .step-content {
            font-size: 14px;
            color: #303133;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .step-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .step-item.editing {
            background: #fff;
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64,158,255,0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .settings-row label {
            font-size: 14px;
            color: #606266;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #2c3e50;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { background: #67c23a; }
        .toast.error { background: #f56c6c; }
        .toast.warning { background: #e6a23c; }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-dark {
            border-color: rgba(0,0,0,0.1);
            border-top-color: #409eff;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-blue { background: #ecf5ff; color: #409eff; }
        .badge-green { background: #f0f9eb; color: #67c23a; }
        .badge-orange { background: #fdf6ec; color: #e6a23c; }

        .timer-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            padding: 10px 14px;
            background: #f5f7fa;
            border-radius: 8px;
        }
        .timer-display {
            font-size: 18px;
            font-weight: 600;
            color: #409eff;
            font-family: 'SF Mono', Monaco, monospace;
            min-width: 60px;
        }
        .timer-hint {
            font-size: 12px;
            color: #909399;
            margin-left: auto;
        }
        .timer-running {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .step-duration {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #e6a23c;
            background: #fdf6ec;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 6px;
        }
        .step-item[draggable="true"] {
            cursor: grab;
        }
        .step-item[draggable="true"]:active {
            cursor: grabbing;
        }
        .step-item.drag-over {
            border-color: #409eff;
            background: #ecf5ff;
            transform: scale(1.01);
        }
        .step-item.dragging {
            opacity: 0.5;
        }
        .filter-bar {
            margin-bottom: 16px;
        }
        .filter-bar .form-input {
            margin-bottom: 10px;
        }
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .tag-filter-label {
            font-size: 13px;
            color: #909399;
        }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .tag-chip:hover {
            transform: translateY(-1px);
        }
        .tag-chip.active {
            box-shadow: 0 0 0 2px rgba(64,158,255,0.3);
        }
        .project-tags-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .project-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .archived-section {
            margin-top: 16px;
        }
        .archived-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 0;
            color: #909399;
            font-size: 14px;
            font-weight: 500;
            border-top: 1px solid #ebeef5;
            user-select: none;
        }
        .archived-header:hover {
            color: #606266;
        }
        .archived-content {
            display: none;
        }
        .archived-content.expanded {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .archived-arrow {
            transition: transform 0.2s;
        }
        .archived-arrow.expanded {
            transform: rotate(90deg);
        }
        .project-item.archived-item {
            opacity: 0.7;
        }
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .header { padding: 16px; }
            .project-header { flex-direction: column; gap: 8px; }
            .project-actions { width: 100%; justify-content: flex-end; }
            .btn-group { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="title-section">
                <h1 id="pageTitle" contenteditable="false">记录</h1>
                <button class="btn btn-sm btn-secondary" id="editTitleBtn">&#9999;&#65039; 编辑标题</button>
            </div>
            <div class="btn-group">
                <div class="sync-status" id="syncStatus">
                    <span class="sync-dot"></span>
                    <span id="syncStatusText">未同步</span>
                </div>
                <button class="btn btn-primary" id="pullBtn">&#128229; 拉取同步</button>
                <button class="btn btn-primary" id="syncBtn">&#128260; 推送同步</button>
                <button class="btn btn-secondary" id="settingsBtn">&#9881;&#65039; 设置</button>
            </div>
        </div>

        <!-- New Project -->
        <div class="card">
            <div class="card-title">&#10133; 新建事项</div>
            <div class="form-group">
                <input type="text" class="form-input" id="newProjectName" placeholder="输入事项名称，例如：番茄炒鸡蛋练习">
            </div>
            <div class="form-group">
                <input type="text" class="form-input" id="newProjectTags" placeholder="标签，用逗号分隔，例如：烹饪,练习">
            </div>
            <button class="btn btn-success" id="addProjectBtn">&#9989; 创建事项</button>
        </div>

        <!-- Project List -->
        <div class="card">
            <div class="card-title">&#128203; 事项列表</div>
            <div class="filter-bar">
                <input type="text" class="form-input" id="searchInput" placeholder="&#128269; 搜索事项名称或环节内容...">
                <div class="tag-filter" id="tagFilter">
                    <span class="tag-filter-label">&#127991; 标签：</span>
                </div>
            </div>
            <div id="projectList" class="project-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <p>暂无事项，点击上方创建</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Project Detail Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <div class="modal-header">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="modal-title" id="modalTitle" contenteditable="false">事项详情</div>
                    <button class="btn btn-sm btn-secondary" id="editProjectNameBtn">&#9999;&#65039; 编辑名称</button>
                </div>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="project-tags-row">
                    <div class="project-tags" id="modalTags"></div>
                    <div style="display:flex;gap:6px;">
                        <button class="btn btn-sm btn-secondary" id="editTagsBtn">&#127991; 编辑标签</button>
                        <button class="btn btn-sm btn-warning" id="archiveBtn">&#128193; 归档</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>&#128221; 更新当前环节</label>
                    <textarea class="form-textarea" id="newStepContent" placeholder="输入当前环节的内容..."></textarea>
                    <small style="color:#909399;font-size:12px;margin-top:6px;display:block;">&#128161; 系统会自动计算该环节与上一环节的时间间隔</small>
                </div>
                <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
                    <button class="btn btn-primary" id="addStepBtn">&#10133; 添加环节</button>
                    <button class="btn btn-danger" id="deleteProjectBtn">&#128465;&#65039; 删除事项</button>
                </div>

                <div class="card-title">&#128220; 历史环节</div>
                <div id="stepList" class="step-list">
                    <!-- steps rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">&#9881;&#65039; 设置</div>
                <button class="modal-close" id="closeSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>GitHub Token</label>
                    <input type="password" class="form-input" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
                    <small style="color:#909399;font-size:12px;margin-top:4px;display:block;">Token 仅保存在本地浏览器中，不会上传到其他地方</small>
                </div>
                <div class="form-group">
                    <label>仓库 Owner</label>
                    <input type="text" class="form-input" id="repoOwner" placeholder="例如：yourname">
                </div>
                <div class="form-group">
                    <label>仓库名称</label>
                    <input type="text" class="form-input" id="repoName" placeholder="例如：my-notes">
                </div>
                <div class="form-group">
                    <label>Issue 编号（同步到的 Issue）</label>
                    <input type="number" class="form-input" id="issueNumber" placeholder="例如：1">
                </div>
                <div style="background:#f5f7fa;padding:12px;border-radius:8px;margin-top:16px;">
                    <div style="font-size:13px;color:#606266;margin-bottom:8px;">&#128161; 如何设置：</div>
                    <ol style="font-size:13px;color:#909399;padding-left:18px;line-height:1.8;">
                        <li>在 GitHub 创建或选择一个仓库</li>
                        <li>在该仓库下创建一个 Issue 用于同步记录</li>
                        <li>生成 Personal Access Token（需 <code>repo</code> 或 <code>public_repo</code> 权限）</li>
                        <li>填写以上信息并保存</li>
                    </ol>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="testConnectionBtn">&#128268; 测试连接</button>
                <button class="btn btn-primary" id="saveSettingsBtn">&#128190; 保存设置</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== State ====================
        const state = {
            title: '记录',
            projects: [],
            currentProjectId: null,
            activeTagFilter: null,
            settings: {
                token: '',
                owner: '',
                repo: '',
                issueNumber: ''
            },
            hasUnsyncedChanges: false,
            autoRefreshDone: false
        };

        // ==================== Utils ====================
        const $ = id => document.getElementById(id);
        const now = () => new Date().toISOString();
        const formatTime = (iso) => {
            if (!iso) return '-';
            const d = new Date(iso);
            return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        };
        const generateId = () => 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        function showToast(msg, type = 'info') {
            const toast = $('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        // ==================== Storage ====================
        function loadLocal() {
            try {
                const saved = localStorage.getItem('jilu_app_data');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.title) state.title = data.title;
                    if (data.projects) state.projects = data.projects;
                    if (data.settings) state.settings = { ...state.settings, ...data.settings };
                    if (data.hasUnsyncedChanges !== undefined) state.hasUnsyncedChanges = data.hasUnsyncedChanges;
                    if (data.autoRefreshDone !== undefined) state.autoRefreshDone = data.autoRefreshDone;
                    if (data.activeTagFilter !== undefined) state.activeTagFilter = data.activeTagFilter;
                }
            } catch (e) { console.error('load error', e); }
        }

        function saveLocal() {
            try {
                localStorage.setItem('jilu_app_data', JSON.stringify({
                    title: state.title,
                    projects: state.projects,
                    settings: state.settings,
                    hasUnsyncedChanges: state.hasUnsyncedChanges,
                    autoRefreshDone: state.autoRefreshDone,
                    activeTagFilter: state.activeTagFilter
                }));
            } catch (e) { console.error('save error', e); }
        }

        // ==================== GitHub API ====================
        async function githubApi(path, opts = {}) {
            const { token } = state.settings;
            if (!token) throw new Error('未设置 Token');
            const url = 'https://api.github.com' + path;
            const res = await fetch(url, {
                ...opts,
                headers: {
                    'Authorization': 'token ' + token,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json',
                    ...opts.headers
                }
            });
            if (res.status === 401) {
                throw new Error('TOKEN_EXPIRED');
            }
            if (!res.ok) {
                const err = await res.text();
                throw new Error('GitHub API ' + res.status + ': ' + err);
            }
            return res.json();
        }

        async function syncToGitHub(force) {
            force = force || false;
            const s = state.settings;
            if (!s.token || !s.owner || !s.repo || !s.issueNumber) {
                showToast('请先完成设置', 'warning');
                openSettings();
                return false;
            }

            if (!force && !state.hasUnsyncedChanges) {
                showToast('没有需要同步的更改', 'info');
                return true;
            }

            const btn = $('syncBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> 同步中...';
            btn.disabled = true;

            try {
                const body = JSON.stringify({
                    title: state.title,
                    projects: state.projects,
                    lastSync: now()
                }, null, 2);

                await githubApi('/repos/' + s.owner + '/' + s.repo + '/issues/' + s.issueNumber, {
                    method: 'PATCH',
                    body: JSON.stringify({ body: body })
                });

                state.hasUnsyncedChanges = false;
                saveLocal();
                updateSyncStatus();
                renderProjects();
                showToast('同步成功！', 'success');
                return true;
            } catch (err) {
                if (err.message === 'TOKEN_EXPIRED') {
                    showToast('Token 已过期，请重新设置', 'error');
                    openSettings();
                    return false;
                }
                showToast('同步失败: ' + err.message, 'error');
                return false;
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function pullFromGitHub() {
            const s = state.settings;
            if (!s.token || !s.owner || !s.repo || !s.issueNumber) return false;

            try {
                const issue = await githubApi('/repos/' + s.owner + '/' + s.repo + '/issues/' + s.issueNumber);
                if (!issue.body) return false;

                try {
                    const data = JSON.parse(issue.body);
                    if (data.title) state.title = data.title;
                    if (data.projects) state.projects = data.projects;
                    state.hasUnsyncedChanges = false;
                    saveLocal();
                    updateSyncStatus();
                    renderProjects();
                    showToast('已同步最新数据', 'success');
                    return true;
                } catch (e) {
                    return false;
                }
            } catch (err) {
                if (err.message === 'TOKEN_EXPIRED') {
                    showToast('Token 已过期，请重新设置', 'error');
                    openSettings();
                }
                console.error('Pull failed', err);
                return false;
            }
        }

        async function testConnection() {
            const btn = $('testConnectionBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-dark"></span> 测试中...';
            btn.disabled = true;

            try {
                const s = state.settings;
                if (!s.token) throw new Error('请输入 Token');
                if (!s.owner) throw new Error('请输入仓库 Owner');
                if (!s.repo) throw new Error('请输入仓库名称');
                if (!s.issueNumber) throw new Error('请输入 Issue 编号');

                const issue = await githubApi('/repos/' + s.owner + '/' + s.repo + '/issues/' + s.issueNumber);
                showToast('连接成功！Issue 标题: ' + issue.title, 'success');
            } catch (err) {
                if (err.message === 'TOKEN_EXPIRED') {
                    showToast('Token 已过期', 'error');
                } else {
                    showToast('连接失败: ' + err.message, 'error');
                }
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ==================== Rendering ====================
        function updateSyncStatus() {
            const el = $('syncStatus');
            const text = $('syncStatusText');
            if (state.hasUnsyncedChanges) {
                el.className = 'sync-status unsynced';
                text.textContent = '有未同步更改';
            } else {
                el.className = 'sync-status synced';
                text.textContent = '已同步';
            }
        }

        function getTagColors(tag) {
            var palette = [
                { bg: '#ecf5ff', fg: '#409eff' },
                { bg: '#f0f9eb', fg: '#67c23a' },
                { bg: '#fdf6ec', fg: '#e6a23c' },
                { bg: '#fef0f0', fg: '#f56c6c' },
                { bg: '#f4f4f5', fg: '#909399' },
                { bg: '#f0f9ff', fg: '#0ea5e9' },
                { bg: '#f5f3ff', fg: '#8b5cf6' },
                { bg: '#fff7ed', fg: '#f97316' }
            ];
            var hash = 0;
            for (var i = 0; i < tag.length; i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
            var idx = Math.abs(hash) % palette.length;
            return palette[idx];
        }

        function renderTagFilter(tags) {
            var container = $('tagFilter');
            if (!container) return;
            var activeTag = state.activeTagFilter || null;
            var html = '<span class="tag-filter-label">&#127991; 标签：</span>';
            if (tags.length === 0) {
                html += '<span style="font-size:12px;color:#c0c4cc;">暂无标签</span>';
            } else {
                html += '<span class="tag-chip ' + (!activeTag ? 'active' : '') + '" onclick="filterByTag(null)" style="background:#f4f4f5;color:#606266;">全部</span>';
                tags.forEach(function(t) {
                    var colors = getTagColors(t);
                    var isActive = activeTag === t;
                    html += '<span class="tag-chip ' + (isActive ? 'active' : '') + '" onclick="filterByTag(\'' + t + '\')" style="background:' + colors.bg + ';color:' + colors.fg + ';">' + escapeHtml(t) + '</span>';
                });
            }
            container.innerHTML = html;
        }

        function renderProjectGroup(projects, isArchived) {
            var sorted = projects.slice().sort(function(a, b) {
                var ta = b.updatedAt || b.createdAt;
                var tb = a.updatedAt || a.createdAt;
                return new Date(ta) - new Date(tb);
            });
            return sorted.map(function(p) {
                var steps = p.steps || [];
                var latestStep = steps.length > 0 ? steps[steps.length - 1] : null;
                var latestContent = latestStep ? latestStep.content : '暂无内容';
                var tagsHtml = (p.tags || []).map(function(t) {
                    var colors = getTagColors(t);
                    return '<span class="project-tag" style="background:' + colors.bg + ';color:' + colors.fg + ';">' + escapeHtml(t) + '</span>';
                }).join('');
                return '<div class="project-item ' + (state.hasUnsyncedChanges ? 'unsynced' : '') + ' ' + (isArchived ? 'archived-item' : '') + '" data-id="' + p.id + '" onclick="openProject(\'' + p.id + '\')">' +
                    '<div class="project-header">' +
                        '<div class="project-name">' + escapeHtml(p.name) + '</div>' +
                        '<div class="project-actions" onclick="event.stopPropagation()">' +
                            '<button class="btn btn-sm btn-warning" onclick="archiveProject(\'' + p.id + '\', event)">' + (p.archived ? '&#9851; 取消归档' : '&#128193; 归档') + '</button>' +
                            '<button class="btn btn-sm btn-primary" onclick="quickAddStep(\'' + p.id + '\', event)">&#10133; 更新</button>' +
                        '</div>' +
                    '</div>' +
                    (tagsHtml ? '<div class="project-tags" style="margin-bottom:6px;">' + tagsHtml + '</div>' : '') +
                    '<div class="project-meta">' +
                        '<span>&#128197; 创建: ' + formatTime(p.createdAt) + '</span>' +
                        '<span>&#128260; 更新: ' + formatTime(p.updatedAt) + '</span>' +
                        '<span>&#128202; ' + steps.length + ' 个环节</span>' +
                    '</div>' +
                    '<div class="project-latest">' +
                        '<span class="badge badge-blue">最新</span> ' + escapeHtml(truncate(latestContent, 60)) +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function renderProjects() {
            const list = $('projectList');

            var allTags = {};
            state.projects.forEach(function(p) {
                (p.tags || []).forEach(function(t) { allTags[t] = true; });
            });
            renderTagFilter(Object.keys(allTags));

            var query = ($('searchInput') ? $('searchInput').value : '').toLowerCase().trim();
            var activeTag = state.activeTagFilter || null;

            var filtered = state.projects.filter(function(p) {
                if (activeTag && (p.tags || []).indexOf(activeTag) === -1) return false;
                if (!query) return true;
                if (p.name.toLowerCase().indexOf(query) !== -1) return true;
                var steps = p.steps || [];
                for (var i = 0; i < steps.length; i++) {
                    if (steps[i].content.toLowerCase().indexOf(query) !== -1) return true;
                }
                return false;
            });

            var activeProjects = filtered.filter(function(p) { return !p.archived; });
            var archivedProjects = filtered.filter(function(p) { return p.archived; });

            if (activeProjects.length === 0 && archivedProjects.length === 0) {
                list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>暂无事项</p></div>';
                return;
            }

            var html = '';
            if (activeProjects.length > 0) {
                html += renderProjectGroup(activeProjects, false);
            }
            if (archivedProjects.length > 0) {
                html += '<div class="archived-section">' +
                    '<div class="archived-header" onclick="toggleArchived()">' +
                        '<span class="archived-arrow" id="archivedArrow">&#9654;</span>' +
                        '<span>&#128193; 已归档 (' + archivedProjects.length + ')</span>' +
                    '</div>' +
                    '<div class="archived-content" id="archivedContent">' +
                        renderProjectGroup(archivedProjects, true) +
                    '</div>' +
                '</div>';
            }
            list.innerHTML = html;
        }

        function renderSteps(project) {
            const list = $('stepList');
            var steps = project.steps || [];
            if (steps.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>暂无环节记录</p></div>';
                return;
            }
            var reversed = steps.slice().reverse();
            list.innerHTML = reversed.map(function(s, idx) {
                var realIdx = steps.length - 1 - idx;
                var updatedLine = '';
                if (s.updatedAt !== s.createdAt) {
                    updatedLine = '<div>修改: ' + formatTime(s.updatedAt) + '</div>';
                }
                var durationLine = '';
                if (s.duration && s.duration > 0) {
                    var m = Math.floor(s.duration / 60);
                    var sec = s.duration % 60;
                    var h = Math.floor(m / 60);
                    var min = m % 60;
                    var timeStr = '';
                    if (h > 0) timeStr += h + '时';
                    if (min > 0 || h > 0) timeStr += min + '分';
                    timeStr += sec + '秒';
                    durationLine = '<div class="step-duration">&#9201; 距上一环节: ' + timeStr + '</div>';
                }
                return '<div class="step-item" id="step-' + s.id + '" draggable="true" data-step-id="' + s.id + '">' +
                    '<div class="step-header">' +
                        '<div style="display:flex;align-items:center;gap:10px;">' +
                            '<div class="step-num">' + (realIdx + 1) + '</div>' +
                            '<span class="badge badge-green">环节 ' + (realIdx + 1) + '</span>' +
                        '</div>' +
                        '<div class="step-time">' +
                            '<div>创建: ' + formatTime(s.createdAt) + '</div>' +
                            updatedLine +
                        '</div>' +
                    '</div>' +
                    '<div class="step-content" id="step-content-' + s.id + '">' + escapeHtml(s.content) + '</div>' +
                    durationLine +
                    '<div class="step-actions">' +
                        '<button class="btn btn-sm btn-secondary" onclick="editStep(\'' + project.id + '\', \'' + s.id + '\')">&#9999;&#65039; 编辑</button>' +
                        '<button class="btn btn-sm btn-danger" onclick="deleteStep(\'' + project.id + '\', \'' + s.id + '\')">&#128465;&#65039; 删除</button>' +
                    '</div>' +
                '</div>';
            }).join('');
            bindStepDragEvents(project);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function truncate(text, len) {
            if (!text) return '';
            return text.length > len ? text.slice(0, len) + '...' : text;
        }

        // ==================== Actions ====================
        function markChanged() {
            state.hasUnsyncedChanges = true;
            saveLocal();
            updateSyncStatus();
            renderProjects();
        }

        function addProject() {
            const name = $('newProjectName').value.trim();
            if (!name) { showToast('请输入事项名称', 'warning'); return; }

            var tagsStr = $('newProjectTags').value.trim();
            var tags = [];
            if (tagsStr) {
                tags = tagsStr.split(/[,，]/).map(function(t) { return t.trim(); }).filter(function(t) { return t; });
            }

            const project = {
                id: generateId(),
                name: name,
                tags: tags,
                archived: false,
                createdAt: now(),
                updatedAt: now(),
                steps: []
            };
            state.projects.push(project);
            $('newProjectName').value = '';
            $('newProjectTags').value = '';
            markChanged();
            showToast('事项创建成功', 'success');
        }

        window.openProject = function(id) {
            const p = state.projects.find(function(x) { return x.id === id; });
            if (!p) return;
            state.currentProjectId = id;
            $('modalTitle').textContent = p.name;
            $('newStepContent').value = '';

            var tagsHtml = (p.tags || []).map(function(t) {
                var colors = getTagColors(t);
                return '<span class="project-tag" style="background:' + colors.bg + ';color:' + colors.fg + ';">' + escapeHtml(t) + '</span>';
            }).join('');
            $('modalTags').innerHTML = tagsHtml || '<span style="color:#c0c4cc;font-size:13px;">无标签</span>';

            $('archiveBtn').innerHTML = p.archived ? '&#9851; 取消归档' : '&#128193; 归档';
            $('archiveBtn').onclick = function() {
                p.archived = !p.archived;
                p.updatedAt = now();
                $('archiveBtn').innerHTML = p.archived ? '&#9851; 取消归档' : '&#128193; 归档';
                markChanged();
                showToast(p.archived ? '事项已归档' : '事项已取消归档', 'success');
            };

            renderSteps(p);
            $('projectModal').classList.add('active');
        };

        function closeProjectModal() {
            $('projectModal').classList.remove('active');
            state.currentProjectId = null;
        }

        function addStep() {
            const content = $('newStepContent').value.trim();
            if (!content) { showToast('请输入环节内容', 'warning'); return; }

            const p = state.projects.find(function(x) { return x.id === state.currentProjectId; });
            if (!p) return;

            var stepData = {
                id: generateId(),
                content: content,
                createdAt: now(),
                updatedAt: now()
            };

            // 自动计算与上一环节的时间间隔
            var steps = p.steps || [];
            if (steps.length > 0) {
                var lastStep = steps[steps.length - 1];
                var diffSeconds = Math.floor((new Date(stepData.createdAt) - new Date(lastStep.createdAt)) / 1000);
                if (diffSeconds > 0) {
                    stepData.duration = diffSeconds;
                }
            }

            p.steps.push(stepData);
            p.updatedAt = now();
            $('newStepContent').value = '';
            renderSteps(p);
            markChanged();
            showToast('环节添加成功', 'success');
        }

        window.quickAddStep = function(projectId, event) {
            event.stopPropagation();
            const content = prompt('请输入当前环节内容：');
            if (!content || !content.trim()) return;

            const p = state.projects.find(function(x) { return x.id === projectId; });
            if (!p) return;

            p.steps.push({
                id: generateId(),
                content: content.trim(),
                createdAt: now(),
                updatedAt: now()
            });
            p.updatedAt = now();
            markChanged();
            showToast('环节添加成功', 'success');
        };

        function deleteProject() {
            if (!confirm('确定要删除这个事项吗？所有环节记录都将丢失。')) return;
            state.projects = state.projects.filter(function(x) { return x.id !== state.currentProjectId; });
            closeProjectModal();
            markChanged();
            showToast('事项已删除', 'success');
        }

        window.editStep = function(projectId, stepId) {
            const p = state.projects.find(function(x) { return x.id === projectId; });
            if (!p) return;
            const s = p.steps.find(function(x) { return x.id === stepId; });
            if (!s) return;

            const item = $('step-' + stepId);
            const contentDiv = $('step-content-' + stepId);

            if (item.classList.contains('editing')) {
                const textarea = item.querySelector('textarea');
                const newContent = textarea.value.trim();
                if (!newContent) { showToast('内容不能为空', 'warning'); return; }
                s.content = newContent;
                s.updatedAt = now();
                p.updatedAt = now();
                item.classList.remove('editing');
                renderSteps(p);
                markChanged();
                showToast('修改已保存', 'success');
            } else {
                item.classList.add('editing');
                contentDiv.innerHTML = '<textarea class="form-textarea" id="edit-' + stepId + '" style="min-height:100px;">' + escapeHtml(s.content) + '</textarea>';
                var btns = item.querySelectorAll('button');
                for (var i = 0; i < btns.length; i++) {
                    if (btns[i].getAttribute('onclick') && btns[i].getAttribute('onclick').indexOf('editStep') >= 0) {
                        btns[i].textContent = '💾 保存';
                    }
                }
            }
        };

        window.deleteStep = function(projectId, stepId) {
            if (!confirm('确定要删除这个环节吗？')) return;
            const p = state.projects.find(function(x) { return x.id === projectId; });
            if (!p) return;
            p.steps = p.steps.filter(function(x) { return x.id !== stepId; });
            p.updatedAt = now();
            renderSteps(p);
            markChanged();
            showToast('环节已删除', 'success');
        };

        // ==================== Title Edit ====================
        function startEditTitle() {
            const title = $('pageTitle');
            title.contentEditable = 'true';
            title.classList.add('editing');
            title.focus();
            const range = document.createRange();
            range.selectNodeContents(title);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            function save() {
                const newTitle = title.textContent.trim();
                if (newTitle) {
                    state.title = newTitle;
                    document.title = newTitle;
                    markChanged();
                } else {
                    title.textContent = state.title;
                }
                title.contentEditable = 'false';
                title.classList.remove('editing');
                title.removeEventListener('blur', save);
                title.removeEventListener('keydown', onKey);
            }
            function onKey(e) {
                if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
            }
            title.addEventListener('blur', save);
            title.addEventListener('keydown', onKey);
        }

        // ==================== Settings ====================
        function openSettings() {
            $('githubToken').value = state.settings.token;
            $('repoOwner').value = state.settings.owner;
            $('repoName').value = state.settings.repo;
            $('issueNumber').value = state.settings.issueNumber;
            $('settingsModal').classList.add('active');
        }
        function closeSettingsModal() {
            $('settingsModal').classList.remove('active');
        }
        function saveSettings() {
            state.settings.token = $('githubToken').value.trim();
            state.settings.owner = $('repoOwner').value.trim();
            state.settings.repo = $('repoName').value.trim();
            state.settings.issueNumber = $('issueNumber').value.trim();
            saveLocal();
            closeSettingsModal();
            showToast('设置已保存', 'success');
        }

        // ==================== Auto Refresh ====================
        async function doAutoRefresh() {
            if (state.autoRefreshDone) return;
            state.autoRefreshDone = true;
            saveLocal();

            const s = state.settings;
            if (s.token && s.owner && s.repo && s.issueNumber) {
                showToast('正在同步最新数据...', 'info');
                await pullFromGitHub();
            }
        }

        // ==================== Edit Tags ====================
        function editTags() {
            var p = state.projects.find(function(x) { return x.id === state.currentProjectId; });
            if (!p) return;
            var currentTags = (p.tags || []).join(', ');
            var newTagsStr = prompt('编辑标签（用逗号分隔）：', currentTags);
            if (newTagsStr === null) return; // cancelled
            var newTags = newTagsStr.split(/[,，]/).map(function(t) { return t.trim(); }).filter(function(t) { return t; });
            p.tags = newTags;
            p.updatedAt = now();

            var tagsHtml = newTags.map(function(t) {
                var colors = getTagColors(t);
                return '<span class="project-tag" style="background:' + colors.bg + ';color:' + colors.fg + ';">' + escapeHtml(t) + '</span>';
            }).join('');
            $('modalTags').innerHTML = tagsHtml || '<span style="color:#c0c4cc;font-size:13px;">无标签</span>';

            markChanged();
            showToast('标签已更新', 'success');
        }

        // ==================== Tag / Archive helpers ====================
        window.filterByTag = function(tag) {
            state.activeTagFilter = tag || null;
            renderProjects();
        };

        window.toggleArchived = function() {
            var content = $('archivedContent');
            var arrow = $('archivedArrow');
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                arrow.classList.remove('expanded');
            } else {
                content.classList.add('expanded');
                arrow.classList.add('expanded');
            }
        };

        window.archiveProject = function(projectId, event) {
            event.stopPropagation();
            var p = state.projects.find(function(x) { return x.id === projectId; });
            if (!p) return;
            p.archived = !p.archived;
            p.updatedAt = now();
            markChanged();
            showToast(p.archived ? '事项已归档' : '事项已取消归档', 'success');
        };

        // ==================== Step Drag & Drop ====================
        function bindStepDragEvents(project) {
            var items = document.querySelectorAll('.step-item[draggable="true"]');
            var dragSrcId = null;

            items.forEach(function(item) {
                item.addEventListener('dragstart', function(e) {
                    dragSrcId = item.getAttribute('data-step-id');
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', dragSrcId);
                });

                item.addEventListener('dragend', function() {
                    items.forEach(function(i) { i.classList.remove('drag-over', 'dragging'); });
                    dragSrcId = null;
                });

                item.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (item.getAttribute('data-step-id') !== dragSrcId) {
                        item.classList.add('drag-over');
                    }
                    return false;
                });

                item.addEventListener('dragleave', function() {
                    item.classList.remove('drag-over');
                });

                item.addEventListener('drop', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    item.classList.remove('drag-over');

                    var srcId = e.dataTransfer.getData('text/plain');
                    var targetId = item.getAttribute('data-step-id');
                    if (srcId === targetId) return;

                    var srcIdx = project.steps.findIndex(function(s) { return s.id === srcId; });
                    var targetIdx = project.steps.findIndex(function(s) { return s.id === targetId; });
                    if (srcIdx === -1 || targetIdx === -1) return;

                    var moved = project.steps.splice(srcIdx, 1)[0];
                    project.steps.splice(targetIdx, 0, moved);
                    project.updatedAt = now();

                    renderSteps(project);
                    markChanged();
                    showToast('环节顺序已调整', 'success');
                    return false;
                });
            });
        }

        // ==================== Edit Project Name ====================
        function startEditProjectName() {
            const title = $('modalTitle');
            title.contentEditable = 'true';
            title.classList.add('editing');
            title.focus();
            const range = document.createRange();
            range.selectNodeContents(title);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            function save() {
                const newName = title.textContent.trim();
                const p = state.projects.find(function(x) { return x.id === state.currentProjectId; });
                if (newName && p) {
                    p.name = newName;
                    p.updatedAt = now();
                    markChanged();
                } else if (p) {
                    title.textContent = p.name;
                }
                title.contentEditable = 'false';
                title.classList.remove('editing');
                title.removeEventListener('blur', save);
                title.removeEventListener('keydown', onKey);
            }
            function onKey(e) {
                if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
            }
            title.addEventListener('blur', save);
            title.addEventListener('keydown', onKey);
        }

        $('editProjectNameBtn').addEventListener('click', startEditProjectName);
        $('modalTitle').addEventListener('click', function() {
            if ($('modalTitle').contentEditable !== 'true') startEditProjectName();
        });

        // ==================== Init ====================
        function init() {
            loadLocal();
            document.title = state.title;
            $('pageTitle').textContent = state.title;
            renderProjects();
            updateSyncStatus();
            doAutoRefresh();
        }

        init();
    </script>
</body>
</html>
